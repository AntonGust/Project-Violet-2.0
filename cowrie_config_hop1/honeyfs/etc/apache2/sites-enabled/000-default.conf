<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Redirect all traffic to WordPress vhost
    RewriteEngine On
    RewriteCond %{HTTP_HOST} !^wp-prod-01 [NC]
    RewriteRule ^(.*)$ http://wp-prod-01$1 [R=301,L]
</VirtualHost>