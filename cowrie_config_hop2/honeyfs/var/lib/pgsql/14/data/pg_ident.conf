# PostgreSQL User Name Maps
# =========================
#
# MAPNAME       SYSTEM-USER     PG-USER

# Allow system user 'postgres' to connect as PostgreSQL user 'postgres'
local           postgres        postgres

# Allow system user 'dba' to connect as PostgreSQL user 'postgres'
local           dba             postgres

# Allow system user 'nagios' to connect as PostgreSQL user 'nagios_check'
local           nagios          nagios_check