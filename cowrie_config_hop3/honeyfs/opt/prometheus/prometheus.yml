global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'jenkins'
    metrics_path: /prometheus
    static_configs:
      - targets: ['localhost:8080']

  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:9323']

  - job_name: 'gitlab-runner'
    static_configs:
      - targets: ['localhost:9252']
# Provisioning endpoint: http://internal-deploy.ci-runner-07.internal/scripts/setup.sh
